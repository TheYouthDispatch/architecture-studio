<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Architecture Studio</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- TOP BAR -->

<header>

<div class="logo">

<h2>Architecture Studio</h2>

</div>

<div class="top-buttons">

<button>Undo</button>

<button>Redo</button>

<button class="gold">Save</button>

</div>

</header>





<!-- MAIN -->

<div class="container">




<!-- LEFT TOOLBAR -->

<aside class="sidebar">

<h3>Build</h3>

<button>🧱 Walls</button>

<button>🚪 Doors</button>

<button>🪟 Windows</button>

<button>🏠 Roofs</button>

<button>🪵 Floors</button>

<button>🪜 Stairs</button>

<button>🪑 Furniture</button>

<button>🌳 Landscaping</button>

<button>💡 Lighting</button>

</aside>





<!-- 3D BUILD AREA -->

<main class="viewport">

<div class="grid">

<h1>3D Build View</h1>

<p>Your Three.js world will appear here.</p>

</div>

</main>





<!-- RIGHT PANEL -->

<aside class="properties">

<h3>Properties</h3>

<label>Material</label>

<select>

<option>Brick</option>

<option>Concrete</option>

<option>Wood</option>

<option>Glass</option>

</select>

<label>Color</label>

<input type="color">

<label>Rotation</label>

<input type="range">

<label>Height</label>

<input type="range">

<button class="delete">

Delete Object

</button>

</aside>

</div>





<!-- BOTTOM BAR -->

<footer>

<button>Move</button>

<button>Rotate</button>

<button>Resize</button>

<button>Paint</button>

<button>Duplicate</button>

<button>Delete</button>

</footer>

</body>
</html>
